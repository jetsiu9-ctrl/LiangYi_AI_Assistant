<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Photoshop-ai-all</title>
    <link rel="stylesheet" href="./style.css">
    <script>
        // 加载UXP API
        try {
            if (typeof require !== 'undefined') {
                window.uxp = require('uxp');
                window.photoshop = require('photoshop');
                console.log('UXP APIs loaded successfully');
            } else {
                console.log('require function not available');
            }
        } catch (e) {
            console.log('UXP not available:', e.message);
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script src="./app.js"></script>
</body>
</html>
